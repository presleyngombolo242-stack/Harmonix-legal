<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Harmonix AI | Environnement de Commande Centralisé</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --dark-space: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--dark-space);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Barre latérale des outils (Tes API) */
        .sidebar {
            width: 250px;
            background: rgba(20, 20, 20, 0.8);
            border-right: 1px solid var(--neon-blue);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .api-status {
            padding: 10px;
            border-radius: 5px;
            background: var(--glass);
            font-size: 0.8rem;
            border-left: 3px solid var(--neon-blue);
        }

        /* Zone de commande centrale */
        .main-engine {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
        }

        .console-output {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            color: var(--neon-blue);
        }

        .input-area {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
        }

        input {
            flex-grow: 1;
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        button {
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .ai-node {
            display: inline-block;
            margin: 5px;
            padding: 5px 10px;
            border-radius: 15px;
            background: var(--neon-purple);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--neon-blue)">HARMONIX AI</h2>
        <div class="api-status">● GROQ : READY</div>
        <div class="api-status">● GEMINI : STANDBY</div>
        <div class="api-status">● RUNWAY : ACTIVE</div>
        <div class="api-status">● ELEVENLABS : LOADED</div>
        <hr style="border-color: #333">
        <p style="font-size: 0.8rem; color: #777;">Système de Presley Ngombolo</p>
    </div>

    <div class="main-engine">
        <div class="console-output" id="console">
            <div>[SYSTEM] : Environnement Harmonix initialisé...</div>
            <div>[SYSTEM] : Prêt pour la génération multi-modale (Texte/Vidéo/Audio).</div>
            <div id="ai-response"></div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Demandez n'importe quoi (Génère une vidéo, analyse ce code, crée un texte...)">
            <button onclick="processCommand()">EXECUTER</button>
        </div>
        
        <div style="margin-top: 15px; text-align: center;">
            <span class="ai-node">LLM : Groq / Llama 3</span>
            <span class="ai-node">Vision : Gemini Pro</span>
            <span class="ai-node">Vidéo : Runway Gen-2</span>
        </div>
    </div>

    <script>
        function processCommand() {
            const input = document.getElementById('userInput').value;
            const consoleBox = document.getElementById('console');
            
            if(!input) return;

            // Simuler l'activité de l'IA
            const timestamp = new Date().toLocaleTimeString();
            consoleBox.innerHTML += `<div style="color:white; margin-top:10px;">> [USER ${timestamp}]: ${input}</div>`;
            
            // Logique de routage (C'est ici qu'on appellera tes clés via un serveur)
            if(input.toLowerCase().includes("vidéo")) {
                consoleBox.innerHTML += `<div style="color:#f1c40f;">[RUNWAY] : Analyse de la demande vidéo en cours...</div>`;
            } else if(input.toLowerCase().includes("prix") || input.toLowerCase().includes("market")) {
                consoleBox.innerHTML += `<div style="color:#2ecc71;">[COINMARKETCAP] : Récupération des données marché...</div>`;
            } else {
                consoleBox.innerHTML += `<div style="color:var(--neon-purple);">[GROQ/GEMINI] : Traitement de la réflexion profonde...</div>`;
            }
            
            document.getElementById('userInput').value = "";
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }
    </script>
</body>
</html>
