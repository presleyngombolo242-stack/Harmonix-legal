<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfroMarket Dakar</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #008000;
    color: white;
    padding: 15px;
    text-align: center;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-around;
    background: #222;
    padding: 10px;
}

nav a {
    color: white;
    text-decoration: none;
}

/* PRODUITS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: orange;
    border: none;
    padding: 10px;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}

button:hover {
    background: darkorange;
}

/* FOOTER */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
    <h1>AfroMarket Dakar 🛍️</h1>
    <p>Mode africaine • Perruques • Gadgets</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#">Tuniques</a>
    <a href="#">Perruques</a>
    <a href="#">Électronique</a>
    <a href="#">Contact</a>
</nav>

<section class="container">

    <!-- PRODUIT 1 -->
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Tunique">
        <h3>Tunique africaine</h3>
        <p>15 000 FCFA</p>
        <button onclick="ajouterPanier('Tunique africaine')">Ajouter</button>
    </div>

    <!-- PRODUIT 2 -->
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Perruque">
        <h3>Perruque naturelle</h3>
        <p>25 000 FCFA</p>
        <button onclick="ajouterPanier('Perruque naturelle')">Ajouter</button>
    </div>

    <!-- PRODUIT 3 -->
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Téléphone">
        <h3>Smartphone</h3>
        <p>85 000 FCFA</p>
        <button onclick="ajouterPanier('Smartphone')">Ajouter</button>
    </div>

</section>

<footer>
    <p>© 2026 AfroMarket Dakar</p>
</footer>

<script>
function ajouterPanier(produit) {
    alert(produit + " ajouté au panier !");
}
</script>

</body>
</html>
