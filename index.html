<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonix Server — Presley Ngombolo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050a0e; --surf: #0d1117; --acc: #00e5ff; --txt: #f0f6fc; --sec: #8b949e; --bord: #30363d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 10px; }
        h1 span { color: var(--acc); }
        .status { display: inline-block; background: rgba(0,225,255,0.1); color: var(--acc); padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; border: 1px solid var(--acc); }
        p { color: var(--sec); margin-bottom: 20px; }
        footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--bord); font-size: 12px; }
        .name { color: #7b2fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">SYSTÈME OPÉRATIONNEL</div>
        <h1>Harmonix <span>Server</span></h1>
        <p>Bienvenue sur l'infrastructure officielle. Le serveur est actuellement en ligne et sécurisé.</p>
        <footer>
            Développé par <span class="name">Presley Ngombolo</span><br>
            © 2026 — Dakar, Sénégal
        </footer>
    </div>
</body>
</html>
