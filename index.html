<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Harmonix OS | Intelligence Multimodale</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; --panel: #151515; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Layout type "Grok/Claude" */
        .app-container { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        
        .sidebar { background: var(--panel); border-right: 1px solid #333; padding: 20px; }
        .main-chat { display: flex; flex-direction: column; position: relative; }

        .chat-window { flex-grow: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        
        /* Bulles de message style "Pro" */
        .message { max-width: 80%; padding: 15px 20px; border-radius: 12px; line-height: 1.6; }
        .user-msg { align-self: flex-end; background: #222; border: 1px solid #444; }
        .ai-msg { align-self: flex-start; background: transparent; border-left: 2px solid var(--neon); }

        /* Barre de commande flottante */
        .input-wrapper { padding: 20px 15%; background: linear-gradient(transparent, var(--bg)); }
        .input-box { 
            background: #1e1e1e; border: 1px solid #333; border-radius: 24px; 
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        input { flex-grow: 1; background: none; border: none; color: white; font-size: 16px; outline: none; }
        
        .btn-exec { background: var(--neon); color: black; border: none; padding: 8px 20px; border-radius: 18px; font-weight: bold; cursor: pointer; }
        
        /* Indicateurs d'IA actives */
        .status-bar { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h2 style="color: var(--neon)">HARMONIX</h2>
            <p style="font-size: 12px; color: #888">Système Opérationnel v2.0</p>
            <div style="margin-top: 50px;">
                <div class="status-bar">Moteur : Groq Llama 3</div>
                <div class="status-bar">Vision : Gemini Pro</div>
                <div class="status-bar">Audio : ElevenLabs</div>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-window" id="chat">
                <div class="message ai-msg">
                    Bonjour Presley. L'environnement Harmonix est synchronisé avec vos clés API. 
                    Je suis prêt à générer du contenu marketing, analyser votre catalogue ou traiter des données.
                </div>
            </div>

            <div class="input-wrapper">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Envoyez une commande (ex: Génère une pub pour la perruque Bob)">
                    <button class="btn-exec" onclick="sendMessage()">ENVOYER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if(!input.value) return;

            // Ajout message utilisateur
            chat.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            
            // Animation de chargement
            const loadingId = "loading-" + Date.now();
            chat.innerHTML += `<div class="message ai-msg" id="${loadingId}">[Réflexion en cours...]</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('http://127.0.0.1:5000/ask-ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: input.value })
                });
                const data = await response.json();
                
                // Ici on affiche la réponse réelle
                document.getElementById(loadingId).innerText = data.choices[0].message.content;
            } catch (e) {
                document.getElementById(loadingId).innerText = "Erreur de synchronisation avec le serveur HP.";
            }
            input.value = "";
        }
    </script>
</body>
</html>
