<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Harmonix Market | AI Powered Marketplace</title>
    <style>
        :root {
            --primary: #e67e22;
            --dark: #0d1117;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Design Futuriste style Amazon AI */
        .hero-ai {
            height: 400px;
            background: linear-gradient(45deg, #0d1117, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--primary);
            text-align: center;
        }

        .search-container {
            background: var(--glass);
            padding: 20px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            width: 60%;
        }

        .ai-status {
            color: #00ff00;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grille de produits */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .product-card {
            background: var(--glass);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .product-card:hover { border-color: var(--primary); transform: scale(1.02); }

        /* Assistant IA flottant */
        #ai-assistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>

    <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">HARMONIX AI</div>
        <nav>Market | Crypto | Tech | Sécurité</nav>
    </header>

    <section class="hero-ai">
        <div class="search-container">
            <div class="ai-status">● Système IA Harmonix Actif</div>
            <h1 style="font-size: 2.5rem;">Recherchez dans le futur</h1>
            <input type="text" placeholder="Demandez à l'IA : Trouve-moi une perruque bouclée..." style="width: 80%; background: none; border: none; color: white; font-size: 1.2rem; outline: none; margin-top: 10px;">
        </div>
    </section>

    <div class="market-grid">
        <div class="product-card">
            <div style="height: 200px; background: #1f2937; border-radius: 10px; margin-bottom: 10px; overflow: hidden;">
                <img src="https://images.pexels.com/photos/3751541/pexels-photo-3751541.jpeg?auto=compress&cs=tinysrgb&w=400" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h4>Perruque Excellence AI</h4>
            <p style="color: var(--primary);">0.0025 BTC / 75.000 CFA</p>
            <button style="width:100%; padding:10px; background:var(--primary); border:none; color:white; border-radius:5px; cursor:pointer;">Acheter maintenant</button>
        </div>
    </div>

    <div id="ai-assistant">🤖</div>

    <footer style="text-align: center; padding: 40px; border-top: 1px solid #30363d; margin-top: 50px;">
        <p>© 2026 Harmonix Market - Infrastructure Sécurisée</p>
        <p>Développé par <span style="color: var(--primary);">Presley Exaucé Ngombolo</span></p>
    </footer>

</body>
</html>
